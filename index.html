<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stash</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar" id="drag-region">
        <input id="search" placeholder="Search snippets…" autocomplete="off" />
        <button id="newBtn" title="New snippet">+</button>
      </div>

      <div class="content">
        <div class="list" id="list"></div>

        <div class="editor" id="editor">
            <div class="editorHeader">
                <div id="editorTitle" class="editorTitle">New Snippet</div>
                <div class="editorHint">Cmd+Enter = save • Esc = close</div>
            </div>

            <div class="row">
                <input id="title" placeholder="Title" />
            </div>
            <div class="row">
                <textarea id="body" placeholder="Body (command/code)…"></textarea>
            </div>
            <div class="row">
                <input id="tags" placeholder="Tags (comma-separated)" />
            </div>

            <div class="actions">
                <button id="deleteBtn" class="danger">Delete</button>
                <div class="spacer"></div>
                <button id="cancelBtn">Cancel</button>
                <button id="saveBtn">Save</button>
            </div>
        </div>

      </div>

      <div class="footer">
        <span>Enter = copy • Esc = close • ↑/↓ navigate</span>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
